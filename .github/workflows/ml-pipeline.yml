name: ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      update_iterations:
        description: "How many update steps to run"
        required: true
        default: "1"

jobs:
  train-model:
    name: Run training pipeline
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      UPDATE_ITERATIONS: ${{ github.event.inputs.update_iterations || '1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore previous pipeline state
        uses: actions/cache/restore@v4
        with:
          path: .ci-state
          key: ml-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ml-state-${{ github.ref_name }}-

      - name: Use restored state
        run: |
          if [ -d ".ci-state/artifacts" ]; then
            cp -R .ci-state/artifacts/. artifacts/
          fi

          if [ -f ".ci-state/accumulated_training_data.csv" ]; then
            mkdir -p data/processed
            cp .ci-state/accumulated_training_data.csv data/processed/accumulated_training_data.csv
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model updates
        run: |
          if ! [[ "$UPDATE_ITERATIONS" =~ ^[0-9]+$ ]]; then
            echo "update_iterations must be a positive number"
            exit 1
          fi

          if [ "$UPDATE_ITERATIONS" -lt 1 ]; then
            echo "update_iterations must be at least 1"
            exit 1
          fi

          for step in $(seq 1 "$UPDATE_ITERATIONS"); do
            echo "Running update step $step of $UPDATE_ITERATIONS"
            python run.py -mode update
          done

      - name: Build monitoring summary
        run: python run.py -mode summary

      - name: Run ML smoke tests
        run: python -m unittest discover -s tests

      - name: Save current pipeline state
        run: |
          mkdir -p .ci-state/artifacts
          cp -R artifacts/history .ci-state/artifacts/
          cp -R artifacts/models .ci-state/artifacts/
          cp -R artifacts/batch_metadata .ci-state/artifacts/
          cp -R artifacts/raw_storage .ci-state/artifacts/
          cp -R artifacts/cleaned_storage .ci-state/artifacts/
          cp data/processed/accumulated_training_data.csv .ci-state/accumulated_training_data.csv

      - name: Store state for the next run
        uses: actions/cache/save@v4
        with:
          path: .ci-state
          key: ml-state-${{ github.ref_name }}-${{ github.run_id }}
