name: ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      update_iterations:
        description: "How many update steps to run"
        required: true
        default: "1"

jobs:
  train-model:
    name: Run training pipeline
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      UPDATE_ITERATIONS: ${{ github.event.inputs.update_iterations || '1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore previous pipeline state
        uses: actions/cache/restore@v4
        with:
          path: .ci-state
          key: ml-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ml-state-${{ github.ref_name }}-

      - name: Use restored state
        run: |
          if [ -d ".ci-state/artifacts" ]; then
            cp -R .ci-state/artifacts/. artifacts/
          fi

          if [ -f ".ci-state/accumulated_training_data.csv" ]; then
            mkdir -p data/processed
            cp .ci-state/accumulated_training_data.csv data/processed/accumulated_training_data.csv
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model updates
        run: |
          if ! [[ "$UPDATE_ITERATIONS" =~ ^[0-9]+$ ]]; then
            echo "update_iterations must be a positive number"
            exit 1
          fi

          if [ "$UPDATE_ITERATIONS" -lt 1 ]; then
            echo "update_iterations must be at least 1"
            exit 1
          fi

          for step in $(seq 1 "$UPDATE_ITERATIONS"); do
            echo "Running update step $step of $UPDATE_ITERATIONS"
            python run.py -mode update
          done

      - name: Build monitoring summary
        run: python run.py -mode summary

      - name: Run ML smoke tests
        run: python -m unittest discover -s tests

      - name: Prepare artifact bundles
        if: always()
        run: |
          mkdir -p artifacts/ci_bundles/logs
          mkdir -p artifacts/ci_bundles/model_bundle
          mkdir -p artifacts/ci_bundles/data_collector_state
          mkdir -p artifacts/ci_bundles/monitoring_dashboard

          cp artifacts/logs/pipeline.log artifacts/ci_bundles/logs/ 2>/dev/null || true

          cp artifacts/models/model_latest.joblib artifacts/ci_bundles/model_bundle/ 2>/dev/null || true
          cp artifacts/models/preprocessor_latest.joblib artifacts/ci_bundles/model_bundle/ 2>/dev/null || true
          cp artifacts/models/model_registry.json artifacts/ci_bundles/model_bundle/ 2>/dev/null || true
          cp artifacts/models/training_metadata.json artifacts/ci_bundles/model_bundle/ 2>/dev/null || true

          cp artifacts/history/stream_state.json artifacts/ci_bundles/data_collector_state/ 2>/dev/null || true
          cp artifacts/history/stream_history.jsonl artifacts/ci_bundles/data_collector_state/ 2>/dev/null || true
          cp data/processed/accumulated_training_data.csv artifacts/ci_bundles/data_collector_state/ 2>/dev/null || true

          cp artifacts/reports/summary/latest_summary.md artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true
          cp artifacts/history/training_history.jsonl artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true
          cp artifacts/history/validation_history.jsonl artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true
          cp artifacts/history/data_quality_history.jsonl artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true
          cp artifacts/history/drift_history.jsonl artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true
          cp artifacts/history/model_drift_history.jsonl artifacts/ci_bundles/monitoring_dashboard/ 2>/dev/null || true

      - name: Upload training logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-logs
          path: artifacts/ci_bundles/logs
          if-no-files-found: warn

      - name: Upload runnable model bundle
        uses: actions/upload-artifact@v4
        with:
          name: runnable-model-bundle
          path: artifacts/ci_bundles/model_bundle
          if-no-files-found: error

      - name: Upload data collector state
        uses: actions/upload-artifact@v4
        with:
          name: data-collector-state
          path: artifacts/ci_bundles/data_collector_state
          if-no-files-found: error

      - name: Upload monitoring dashboard
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-dashboard
          # TODO: fix before final submission: should point to artifacts/ci_bundles/monitoring_dashboard
          path: artifacts/ci_bundles/monitoring_dashboard_ready
          if-no-files-found: error

      - name: Save current pipeline state
        run: |
          mkdir -p .ci-state/artifacts
          cp -R artifacts/history .ci-state/artifacts/
          cp -R artifacts/models .ci-state/artifacts/
          cp -R artifacts/batch_metadata .ci-state/artifacts/
          cp -R artifacts/raw_storage .ci-state/artifacts/
          cp -R artifacts/cleaned_storage .ci-state/artifacts/
          cp data/processed/accumulated_training_data.csv .ci-state/accumulated_training_data.csv

      - name: Store state for the next run
        uses: actions/cache/save@v4
        with:
          path: .ci-state
          key: ml-state-${{ github.ref_name }}-${{ github.run_id }}
